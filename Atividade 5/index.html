<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Cadastro</title>
  
  <style> 
  form {
  width: 100%;
  max-width: 400px;
  margin: 40px auto;
  background-color: white;
  padding: 20px;
  border: 1px solid #ccc;
  border-radius: 10px;
}

h2 {
  text-align: center;
}

fieldset {
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 16px;
}

legend {
  font-weight: bold;
  color: #59e24a;
  padding: 0 6px;
}

label {
  display: block;
  margin-top: 10px;
  margin-bottom: 4px;
  font-weight: bold;
}

input[type="text"],
input[type="email"],
input[type="password"],
input[type="date"],
input[type="file"],
select,
textarea {
  width: 100%;
  padding: 8px;
  margin-bottom: 6px;
  border: 1px solid #aaa;
  border-radius: 6px;
  box-sizing: border-box;
  font-size: 14px;
}

input[type="text"]:focus,
input[type="email"]:focus,
input[type="password"]:focus,
input[type="date"]:focus,
select:focus,
textarea:focus {
  background-color: #e8f0fe;
  outline: none;
  border-color: #4a90e2;
}

input:invalid {
  border: 2px solid red;
}

textarea {
  resize: vertical;
}

.grupo-radio,
.grupo-checkbox {
  margin-top: 4px;
}

.grupo-radio label,
.grupo-checkbox label {
  font-weight: normal;
  display: inline;
  margin-left: 4px;
}

.linha-opcao {
  display: block;
  margin-bottom: 4px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background-color: #59e24a;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background-color: #59e24a;
}
 </style>
</head>
<body>

  <form action="/cadastro" method="post">
    <h2>Cadastro</h2>

    <fieldset>
      <legend>Dados Pessoais</legend>

      <label>Nome</label>
      <input type="text" name="nome" placeholder="Seu nome completo"><br>

      <label>E-mail</label>
      <input type="email" name="email" placeholder="seuemail@email.com"><br>

      <label>Senha</label>
      <input type="password" name="senha" placeholder="Digite sua senha"><br>

      <label>Data de Nascimento</label>
      <input type="date" name="nascimento"><br>
    </fieldset>

    <fieldset>
      <legend>Informações do Curso</legend>

      <label>Curso</label>
      <select name="curso">
        <option value="">Selecione...</option>
        <option value="ads">Análise e Desenvolvimento de Sistemas</option>
        <option value="engenharia">Engenharia de Software</option>
        <option value="cc">Ciência da Computação</option>
        <option value="outro">Outro</option>
      </select><br>

      <label>Sexo</label><br>
      <input type="radio" name="sexo" value="masculino"> Masculino<br>
      <input type="radio" name="sexo" value="feminino"> Feminino<br>
      <input type="radio" name="sexo" value="outro"> Prefiro não informar<br>

      <label>Interesses</label><br>
      <input type="checkbox" name="interesses" value="tecnologia"> Tecnologia<br>
      <input type="checkbox" name="interesses" value="games"> Games<br>
      <input type="checkbox" name="interesses" value="filmes"> Filmes e Series<br>
      <input type="checkbox" name="interesses" value="anime"> Anime<br>
    </fieldset>

    <fieldset>
      <legend>Extras</legend>

      <label>Comentários</label><br>
      <textarea name="comentarios" rows="4" cols="40" placeholder="Escreva alguma coisa..."></textarea><br><br>

      <label>Upload de Foto</label><br>
      <input type="file" name="foto">
    </fieldset>

    <br>
    <button type="submit">Enviar Cadastro</button>
  </form>

</body>
</html>
